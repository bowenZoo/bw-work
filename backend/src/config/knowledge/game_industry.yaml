categories:
  - name: "付费指标基准"
    keywords: ["付费率", "ARPPU", "ARPU", "LTV", "F2P", "免费", "氪金", "付费", "收入", "monetization"]
    entries:
      - title: "手游付费率基准"
        data: "休闲游戏: 1-3% | 中核游戏: 3-8% | 硬核/MMO: 5-15% | 二次元: 8-20% | SLG: 5-12%"
      - title: "ARPPU 区间（月）"
        data: "休闲: 30-80元 | 中核: 80-200元 | 重度: 200-500元 | 鲸鱼用户: 1000-5000+元 | 超R: 5000-50000+元"
      - title: "ARPU 参考（月）"
        data: "休闲: 1-5元 | 中核: 10-30元 | 重度RPG: 30-80元 | 二次元: 20-60元 | SLG: 15-50元"
      - title: "LTV 估算公式"
        data: "LTV = ARPDAU x 留存天数之和 | 简化: LTV = ARPDAU x (1/ln(D2留存率)) | 经验公式: LTV = D7_ARPU x 3~5倍"
      - title: "首充与付费转化"
        data: "首充礼包价格: 6元(国内)/0.99$(海外) | 首充转化率: 10-25% | 首充到二充转化: 30-50% | 648占比: 高质量用户>30%"

  - name: "留存率基准"
    keywords: ["留存", "次留", "七留", "月留", "回流", "DAU", "MAU", "retention"]
    entries:
      - title: "典型留存率 - 休闲"
        data: "D1: 40-50% | D7: 15-25% | D30: 5-10% | D60: 3-6%"
      - title: "典型留存率 - 中核"
        data: "D1: 30-40% | D7: 12-20% | D30: 5-8% | D60: 3-5%"
      - title: "典型留存率 - 硬核/MMO"
        data: "D1: 25-35% | D7: 10-18% | D30: 4-7% | D60: 2-5%"
      - title: "典型留存率 - 二次元"
        data: "D1: 35-50% | D7: 18-30% | D30: 8-15% | D60: 5-10%"
      - title: "DAU/MAU 比率"
        data: "健康值: 15-25% | 优秀: >30% | 社交/竞技类可达: 40-50% | 低于10%需关注"
      - title: "回流率参考"
        data: "大版本回流: 15-30%流失用户 | 周年庆: 20-40% | 联动活动: 10-20% | 回流用户7日再留存: 30-50%"

  - name: "抽卡/Gacha 机制"
    keywords: ["抽卡", "保底", "gacha", "pity", "概率", "十连", "卡池", "up", "限定"]
    entries:
      - title: "主流抽卡保底对比"
        data: "原神: 90抽硬保底(0.6%基础/73抽起递增) | 明日方舟: 50抽后每抽+2%(6星2%) | FGO: 无保底(1%五星) | 崩铁: 90抽保底(0.6%基础/73抽递增) | 蔚蓝档案: 200抽天井"
      - title: "十连保底常见设计"
        data: "十连保底SR: 行业标准 | 天井系统(200-300抽换): 日服常见 | 概率递增(软保底): 原神/崩铁模式 | 定轨系统: 武器/光锥池常用"
      - title: "抽卡经济学"
        data: "单抽成本: 免费约1-2天产出1抽 | 月卡用户: 约60-90抽/月 | 零氪保底周期: 1.5-2个版本攒够一个保底 | 硬保底花费: 约800-1200元"
      - title: "UP池概率设计"
        data: "UP角色占比: 50%(大小保底) | 常驻稀释: 4-8个角色分摊 | 武器池UP: 75%概率(原神) | 新角色首月抽取率: 通常20-40%活跃用户"
      - title: "抽卡心理学设计"
        data: "欧洲人效应: 前10抽略高概率(hook) | 沉没成本: 接近保底时付费意愿激增 | 展示效应: 全服广播SSR获得 | 限时焦虑: 限定池通常14-21天"

  - name: "战斗数值模型"
    keywords: ["DPS", "战斗", "攻击", "防御", "暴击", "属性", "伤害公式", "数值", "成长", "等级"]
    entries:
      - title: "常见伤害公式类型"
        data: "减法型: DMG=ATK-DEF (简单粗暴,前期碾压) | 除法型: DMG=ATK^2/(ATK+DEF) (平滑) | 乘法型: DMG=ATK x (1-DEF_RATE) (百分比减伤) | 混合型: DMG=(ATK-DEF) x 倍率 x 暴击"
      - title: "暴击系统参数基准"
        data: "暴击率基础: 5-10% | 暴击伤害倍率: 150-200% | 暴击率上限: 80-100% | 暴击伤害上限: 300-400% | 期望DPS提升公式: 1+(暴击率 x (暴击倍率-1))"
      - title: "属性成长曲线"
        data: "线性: Y=a*X+b (易理解,后期乏力) | 指数: Y=a*b^X (后期爆炸,需控制) | 对数: Y=a*ln(X)+b (前快后慢) | S型: Y=a/(1+e^(-k(X-X0))) (前慢中快后慢,推荐)"
      - title: "等级与属性膨胀"
        data: "每级属性提升: 2-5%为温和 | 10级代差: 战力1.5-3倍 | 满级/1级战力比: 通常50-200倍 | 装备贡献占比: 40-60%为健康"
      - title: "元素/属性克制倍率"
        data: "强克制: 1.5-2.0倍 | 弱克制: 1.25-1.5倍 | 被克制: 0.5-0.75倍 | 三角克制最稳定 | 五行/多元素需平衡矩阵"

  - name: "经济系统"
    keywords: ["金币", "经济", "通胀", "产出", "消耗", "货币", "商城", "钻石", "体力"]
    entries:
      - title: "双货币体系"
        data: "软货币(金币): 游戏内获取, 消耗品/强化 | 硬货币(钻石): 付费获取, 抽卡/加速 | 汇率: 通常 1:100 到 1:1000"
      - title: "经济健康指标"
        data: "产消比: 理想1:0.7~0.9(略有盈余感) | 通胀率: 月<5%为健康 | 回本周期: 免费玩家30-60天获得首个核心目标"
      - title: "体力系统设计"
        data: "体力上限: 覆盖20-40分钟游玩 | 恢复速率: 自然恢复6-8小时回满 | 体力购买: 每日限购3-5次,价格递增 | 溢出机制: 邮箱/道具存储"
      - title: "商城定价策略"
        data: "锚定效应: 放一个高价商品提升其他性价比感 | 首充6元: 转化门槛最低 | 月卡30元: 最高性价比,培养付费习惯 | 通行证68-128元: 赛季制核心收入"
      - title: "资源产出节奏"
        data: "日常任务: 占每日总产出30-40% | 周常/公会: 20-30% | 活动: 20-30% | 成就/一次性: 10-20% | 目标: 玩家每天上线有事做但不过度肝"

  - name: "运营数据"
    keywords: ["运营", "活动", "赛季", "版本", "更新", "内容", "推送", "公告"]
    entries:
      - title: "版本更新节奏"
        data: "大版本: 6-8周 | 小更新: 2-3周 | 热修复: 随时 | 赛季: 通常6-12周 | 二次元: 通常42天一个版本(原神模式)"
      - title: "活动收入占比"
        data: "日常收入: 30-40% | 新角色/新卡池: 25-35% | 限时活动: 15-25% | 赛季通行证: 10-15%"
      - title: "活动类型与效果"
        data: "登录签到: 留存提升5-10% | 限时挑战: DAU提升10-20% | 联动活动: 回流15-25% | 充值返利: 收入峰值2-5倍 | PVP赛季: 活跃度持续提升"
      - title: "推送与召回"
        data: "推送打开率: 5-15% | 最佳推送时间: 12:00-13:00, 19:00-21:00 | 召回邮件: 打开率10-20% | 召回奖励: 等值3-7天游玩产出"
      - title: "服务器与运维"
        data: "停服维护: 通常4-6小时 | 维护补偿: 每小时约等于半日产出 | 紧急维护: 补偿翻倍 | 合服时机: 活跃低于峰值30%时考虑"

  - name: "用户体验基准"
    keywords: ["新手", "引导", "教程", "loading", "UI", "反馈", "体验", "UX"]
    entries:
      - title: "新手引导时长"
        data: "休闲: 1-3分钟 | 中核: 5-10分钟 | 重度: 15-30分钟 | 关键: 3分钟内必须有首次正反馈"
      - title: "操作反馈延迟容忍"
        data: "点击反馈: <100ms | 技能释放: <200ms | 网络请求: <1s可接受, >3s需loading | 加载界面: >5s需进度条"
      - title: "教程完成率"
        data: "强制引导完成率: 85-95% | 每增加1步流失: 3-8% | 可跳过引导跳过率: 30-50% | 最佳引导步数: 5-8步核心循环"
      - title: "UI/交互规范"
        data: "按钮最小点击区域: 44x44pt | 重要操作需二次确认 | 文字最小字号: 12pt | 关键信息不超过3层深度 | 主色调不超过3种"
      - title: "包体与性能"
        data: "首包大小: iOS<200MB理想, <500MB可接受 | 安卓: <100MB理想(应用宝限制) | 加载时间: 冷启动<5s | 帧率: 30fps最低, 60fps目标 | 内存: <1.5GB(中端机)"

  - name: "社交与多人"
    keywords: ["社交", "公会", "好友", "匹配", "PVP", "PVE", "组队", "排行"]
    entries:
      - title: "公会系统参考"
        data: "公会人数: 30-50人(小型), 50-100人(标准) | 活跃率: 健康>50% | 公会战频率: 每周1-2次 | 公会等级: 10-20级, 3-6个月满级"
      - title: "匹配系统"
        data: "PVP匹配时间: <30s理想, <60s可接受 | ELO分段: 通常5-8个大段 | 匹配池最小: 同时在线>100人 | 保护机制: 连败3-5场匹配较弱对手"
      - title: "排行榜设计"
        data: "全服排行: 前100-500名 | 好友排行: 促进社交对比 | 段位分布: 钻石以上<10%, 黄金段30-40% | 赛季重置: 回退1-2个大段"
      - title: "社交功能优先级"
        data: "P0: 好友系统+聊天 | P1: 公会/帮派 | P2: 交易/赠送 | P3: 社区/动态 | 关键: 前3天引导加好友/入会"
